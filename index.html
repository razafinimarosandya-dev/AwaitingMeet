<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Feather Icons for lightweight SVGs -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<style>
    :root {
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --primary-light: #eff6ff;
        --bg-page: #f4f7fb;
        --bg-surface: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        --font-family: 'Inter', system-ui, sans-serif;
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --primary-color: #2563eb;
        --surface-color: #ffffff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: var(--font-family);
        background-color: var(--bg-page);
        color: var(--text-main);
        line-height: 1.5;
    }

    a {
        text-decoration: none;
        color: inherit;
        transition: var(--transition);
    }

    .nav-links a.active-nav {
        color: var(--text-main);
        font-weight: 600;
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 4px;
    }

    .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: currentColor;
        animation: spin 0.8s ease-in-out infinite;
        margin-right: 6px;
        vertical-align: sub;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Navbar */
    /* .navbar {
    background-color: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
    padding: 0 2rem; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
} */
    .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 32px;
        background-color: var(--surface-color);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: var(--shadow-sm);
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-muted);
    }

    .nav-links a {
        color: var(--primary-color);

    }

    .nav-links a:hover {
        color: var(--text-main);
    }

    .nav-left,
    .nav-right {
        display: flex;
        align-items: center;
        gap: 2rem;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 700;
        font-size: 1.1rem;
    }

    .logo-icon {
        background-color: var(--primary);
        color: white;
        border-radius: 6px;
        padding: 4px;
        width: 28px;
        height: 28px;
    }

    .search-bar {
        display: flex;
        align-items: center;
        background: #f1f5f9;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        color: var(--text-muted);
        width: 300px;
        margin-left: 1rem;
    }

    .search-bar input {
        border: none;
        background: none;
        outline: none;
        margin-left: 8px;
        font-family: inherit;
        width: 100%;
        font-size: 0.85rem;
    }

    .icon-btn {
        color: var(--text-muted);
        cursor: pointer;
    }

    .profile-pic img {
        border-radius: 50%;
        width: 32px;
        height: 32px;
    }

    /* Main layout */
    .main-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .session-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        margin-bottom: 0.25rem;
    }

    .page-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
    }

    /* Current session */
    .current-session {
        margin-bottom: 2rem;
    }

    .active-request-box {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow-sm);
    }

    .active-left {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .badge-blue {
        background: #e0e7ff;
        color: #4338ca;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 4px;
    }

    .active-id {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
    }

    .active-subtext {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    /* Table Section */
    .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
    }

    .list-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
    }

    .filter-data {
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
    }

    .table-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }

    .data-table th {
        background: #f8fafc;
        padding: 1rem;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-color);
    }

    .data-table td {
        padding: 0.8rem;
        margin: 0.5rem;
        font-size: 0.8rem;
        border-bottom: 1px solid var(--border-color);
        vertical-align: middle;
    }

    .req-id-link {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        width: 100%;
    }

    .req-id-link:hover {
        text-decoration: underline;
    }

    /* table components */
    .status-pill {
        font-size: 0.8rem;
        font-weight: 600;
        padding: 4px 8px;
        border-radius: 4px;
        background: #e2e8f0;
        color: #475569;
        display: inline-block;
    }

    /* Footer */
    .table-footer {
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .pagination {
        display: flex;
        gap: 0.5rem;
    }

    .btn-page {
        background: white;
        border: 1px solid var(--border-color);
        padding: 4px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
    }

    .btn-page:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* Buttons */
    .btn-outline-blue {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
        border-radius: 6px;
        padding: 6px 16px;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-outline-blue:hover {
        background: var(--primary-light);
    }

    .btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-primary:hover {
        background: var(--primary-hover);
    }

    .btn-secondary {
        background: white;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-secondary:hover {
        background: #f8fafc;
    }

    /* Modal */
    .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal-window {
        background: white;
        width: 500px;
        max-width: 90%;
        max-height: 90vh;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-lg);
        overflow: hidden;
    }

    .modal-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
    }

    .close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text-muted);
    }

    .modal-body {
        padding: 1.5rem;
        overflow-y: auto;
        flex: 1;
    }

    .modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        background: #f8fafc;
    }

    /* Detail List */
    .form-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .detail-row {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px dashed #e2e8f0;
        padding-bottom: 0.5rem;
        align-items: center;
    }

    .detail-label {
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 500;
    }

    .detail-value {
        font-weight: 500;
        font-size: 0.95rem;
        text-align: right;
        max-width: 60%;
    }

    .detail-input {
        padding: 4px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        text-align: right;
    }

    /* Filter */
    /* Filter Bar Styling */
    .filter-bar {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out, margin-bottom 0.3s;
        background: var(--bg-surface);
        border-radius: 8px;
        border: 1px solid transparent;
        margin-bottom: 0;
    }

    .filter-bar.active {
        max-height: 200px;
        /* Ajustez selon vos besoins */
        margin-bottom: 1rem;
        border: 1px solid var(--border-color);
        padding: 1rem;
    }

    .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        align-items: flex-end;
    }

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .filter-group label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
    }

    .filter-group select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        font-family: inherit;
        font-size: 0.85rem;
        outline: none;
        background-color: #f9fafb;
    }

    .filter-actions {
        display: flex;
        align-items: center;
    }

    .multi-select-container {
        background: #f8fafc;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        height: 120px;
        overflow-y: auto;
        padding: 8px;
    }

    .custom-select {
        position: relative;
        width: 100%;
    }

    .select-input-wrapper {
        display: flex;
        align-items: center;
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 0 8px;
    }

    .select-input-wrapper input {
        border: none;
        outline: none;
        padding: 8px 4px;
        width: 100%;
        font-size: 0.85rem;
    }

    .toggle-icon {
        width: 16px;
        height: 16px;
        cursor: pointer;
        color: var(--text-muted);
    }

    .options-dropdown {
        position: absolute;
        top: 105%;
        left: 0;
        right: 0;
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 100;
        box-shadow: var(--shadow-lg);
        display: none;
        /* Caché par défaut */
        padding: 5px;
    }

    .options-dropdown.show {
        display: block;
        height: 90px;
        overflow: scroll;
    }

    .filter-option {
        display: flex;
        align-items: center;
        padding: 6px 8px;
        font-size: 0.8rem;
        cursor: pointer;
        border-radius: 4px;
    }

    .filter-option:hover {
        background: var(--primary-light);
    }

    .filter-option input {
        margin-right: 10px;
    }
</style>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <i data-feather="grid" class="logo-icon blue-box"></i>
                <span class="logo-text">Meeting</span>
            </div>
            <div class="search-bar">
                <i data-feather="search"></i>
                <input type="text" id="global-search" placeholder="Search Request ID or Custom or Title">
            </div>
            <div class="nav-links">
                <a href="https://costing-home.vercel.app/">Home</a>
                <!-- <a href="https://request-costing.vercel.app/" id="nav-request">Request</a> -->
                <a href="#" id="nav-awaiting-meeting" class="active-nav">Meeting</a>
                <a href="#" id="nav-cancel">Cancel</a>
                <a href="#" id="nav-awaiting-techpack">Complete</a>
                <a href="#" id="nav-calendar">Calendar</a>
            </div>
        </div>
        <div class="nav-right">
            <i data-feather="bell" class="icon-btn"></i>
            <div class="profile-pic">
                <img src="https://ui-avatars.com/api/?name=User&background=333&color=fff" alt="User" />
            </div>
        </div>
    </nav>

    <main class="main-container">

        <!-- Requests List Container -->
        <section class="requests-list">
            <div class="list-header">
                <h2 id="table-title">Awaiting Meeting</h2>
                <span class="filter-data">Filter Data</span>
            </div>

            <!-- Filter -->
            <div id="filter-bar" class="filter-bar">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>Title</label>
                        <div class="custom-select" id="select-Title">
                            <div class="select-input-wrapper">
                                <input type="text" placeholder="Search Title..."
                                    onkeyup="filterOptions('Title', this.value)">
                                <i data-feather="chevron-down" class="toggle-icon"
                                    onclick="toggleDropdown('Title')"></i>
                            </div>
                            <div class="options-dropdown" id="dropdown-Title"></div>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Customer</label>
                        <div class="custom-select" id="select-Customer">
                            <div class="select-input-wrapper">
                                <input type="text" placeholder="Search Customer..."
                                    onkeyup="filterOptions('Customer', this.value)">
                                <i data-feather="chevron-down" class="toggle-icon"
                                    onclick="toggleDropdown('Customer')"></i>
                            </div>
                            <div class="options-dropdown" id="dropdown-Customer"></div>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Assigned PL</label>
                        <div class="custom-select" id="select-PL_Name">
                            <div class="select-input-wrapper">
                                <input type="text" placeholder="Search PL..."
                                    onkeyup="filterOptions('PL_Name', this.value)">
                                <i data-feather="chevron-down" class="toggle-icon"
                                    onclick="toggleDropdown('PL_Name')"></i>
                            </div>
                            <div class="options-dropdown" id="dropdown-PL_Name"></div>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Meeting Date</label>
                        <div class="custom-select" id="select-Meeting_Date">
                            <div class="select-input-wrapper">
                                <input type="text" placeholder="Search Date..."
                                    onkeyup="filterOptions('Meeting Date', this.value)">
                                <i data-feather="chevron-down" class="toggle-icon"
                                    onclick="toggleDropdown('Meeting_Date')"></i>
                            </div>
                            <div class="options-dropdown" id="dropdown-Meeting_Date"></div>
                        </div>
                    </div>
                </div>

                <div class="filter-footer" style="margin-top: 1.5rem; display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="applyFilters()">Apply Filters</button>
                    <button class="btn-secondary" onclick="resetFilters()">Clear All</button>
                </div>
            </div>
            <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Request ID</th>
                            <th>Title</th>
                            <th>Customer</th>
                            <th>Assigned PL</th>
                            <th>Costing_RD</th>
                            <th>Status</th>
                            <th>Meeting Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Filled by JS -->
                        <tr>
                            <td colspan="8" style="text-align:center;">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
                <div class="table-footer">
                    <span id="total-requests">Total Requests: 0</span>
                    <div class="pagination">
                        <button class="btn-page" disabled>Previous</button>
                        <button class="btn-page" disabled>Next</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Calendar View Section -->
        <section class="calendar-section" id="calendar-section"
            style="display: none; margin-bottom: 32px; background: white; padding: 24px; border-radius: 8px; box-shadow: var(--shadow-sm);">
            <div class="calendar-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <button class="btn-outline-blue" id="cal-prev-btn" style="padding: 6px 12px;">&lt; Previous</button>
                <h2 id="cal-month-title" style="margin: 0; font-size: 20px;">Month Year</h2>
                <button class="btn-outline-blue" id="cal-next-btn" style="padding: 6px 12px;">Next &gt;</button>
            </div>
            <div
                style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; margin-bottom: 10px; color: var(--text-muted); padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <div id="calendar-grid"
                style="display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 100px; gap: 8px; text-align: left;">
                <!-- Calendar cells rendered here via JS -->
            </div>
        </section>
    </main>

    <!-- Calendar Day Requests Modal -->
    <div class="modal-backdrop" id="calendar-day-modal" style="display: none;">
        <div class="modal-window">
            <div class="modal-header">
                <h2 id="calendar-day-title" style="font-size: 1.1rem; font-weight: 600;">Requests for Date</h2>
                <button class="close-btn" id="close-calendar-day-btn">&times;</button>
            </div>
            <div class="modal-body" id="calendar-day-content">
                <!-- Details injected here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary"
                    onclick="document.getElementById('calendar-day-modal').style.display='none';">Close</button>
            </div>
        </div>
    </div>

    <!-- Details/Edit Modal -->
    <div class="modal-backdrop" id="request-modal" style="display: none;">
        <div class="modal-window">
            <div class="modal-header">
                <h2>Request Details</h2>
                <button class="close-btn" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <input type="hidden" id="edit-row-index">
                    <div class="form-list" id="modal-details-list">
                        <!-- Details injected here -->
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <!-- Group 1: Edit Mode Actions -->
                <div id="edit-actions" style="display: none; gap: 8px; width: 100%; justify-content: flex-end;">
                    <button type="button" class="btn-secondary" id="btn-cancel-edit"
                        onclick="cancelEditMode()">Discard</button>
                    <button type="button" class="btn-primary" id="btn-save" onclick="saveEdit()">Save Changes</button>
                </div>

                <!-- Group 2: Main View Actions -->
                <div id="main-actions" style="display: flex; gap: 8px; width: 100%; justify-content: flex-end;">

                    <!-- Pre-Process Toggle State -->
                    <div id="process-toggle-group" style="display: flex; gap: 8px;">
                        <button type="button" class="btn-primary" id="btn-process-toggle"
                            onclick="toggleProcessMenu()">Process</button>
                        <button type="button" class="btn-secondary" id="btn-close-main"
                            onclick="closeModal()">Close</button>
                    </div>

                    <!-- Post-Process Choice State -->
                    <div id="process-nested-menu" style="display: none; gap: 8px; align-items: center;">
                        <button type="button" class="btn-primary"
                            style="background-color: #10b981; border: none; color: white;" id="btn-process"
                            onclick="updateStatus('Awaiting Techpack')">Submit</button>
                        <button type="button" class="btn-danger"
                            style="background-color: #ef4444; border: none; color: white; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;"
                            id="btn-cancel" onclick="updateStatus('Cancel')">Not Proceed</button>
                        <button type="button" class="btn-outline-blue" id="btn-edit" onclick="enableEditMode()"
                            style="padding: 10px 16px; border-radius: 8px; font-weight: 600;">Edit</button>
                    </div>

                </div>
            </div>
            <!-- Scripts for Process toggle menu -->
            <script>
                function toggleProcessMenu() {
                    document.getElementById('process-toggle-group').style.display = 'none';
                    document.getElementById('process-nested-menu').style.display = 'flex';
                }
                function resetProcessMenu() {
                    const group = document.getElementById('process-toggle-group');
                    const menu = document.getElementById('process-nested-menu');
                    if (group) group.style.display = 'flex';
                    if (menu) menu.style.display = 'none';
                }
            </script>
        </div>
    </div>

    <script>
        feather.replace();
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSdyx3uNKZPhbhwg_eIc_VmRTvUNF8-Q5z9hunbr7seSuz2nNdO-awDI8qserEQHkr/exec";

        let globalData = [];
        let filteredData = [];
        let activeViewMode = "Awaiting Meeting";
        let globalSearchText = "";
        let activeFilters = {
            "Title": [],
            "Customer": [],
            "PL_Name": [],
            "Meeting Date": []
        };

        const DETAIL_FIELDS = [
            "C_Number", "Title", "Customer", "Customer Department", "TKL Season",
            "Main Fabric", "Fabric Header", "PL_Name", "Status",
            "Requested_Date", "Created By", "Remarks", "Folder Path"
        ];

        document.addEventListener("DOMContentLoaded", () => {
            fetchData();

            // Search event
            const searchInput = document.getElementById("global-search");
            searchInput.addEventListener("input", (e) => {
                globalSearchText = e.target.value.trim().toLowerCase();
                applyFilters();
            });

            document.getElementById("modal-close").addEventListener("click", closeModal);
            // Toggle Filter Bar
            const filterBtn = document.querySelector(".filter-data");
            filterBtn.addEventListener("click", () => {
                const bar = document.getElementById("filter-bar");
                bar.classList.toggle("active");
            });

            // Listeners pour les filtres
            ['filter-title', 'filter-customer', 'filter-pl', 'filter-date'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('change', applyFilters);
            });

            // Navbar listeners
            document.getElementById("nav-awaiting-meeting").addEventListener("click", (e) => { e.preventDefault(); document.querySelector('.requests-list').style.display = 'block'; document.getElementById('calendar-section').style.display = 'none'; fetchData("Awaiting Meeting", e.target); });
            document.getElementById("nav-cancel").addEventListener("click", (e) => { e.preventDefault(); document.querySelector('.requests-list').style.display = 'block'; document.getElementById('calendar-section').style.display = 'none'; fetchData("Cancel", e.target); });
            document.getElementById("nav-awaiting-techpack").addEventListener("click", (e) => { e.preventDefault(); document.querySelector('.requests-list').style.display = 'block'; document.getElementById('calendar-section').style.display = 'none'; fetchData("Awaiting Techpack", e.target); });

            const navCalendar = document.getElementById("nav-calendar");
            if (navCalendar) {
                navCalendar.addEventListener("click", async (e) => {
                    e.preventDefault();
                    document.querySelectorAll(".nav-links a").forEach(a => a.classList.remove("active-nav"));
                    navCalendar.classList.add("active-nav");
                    document.querySelector('.requests-list').style.display = 'none';
                    document.getElementById('calendar-section').style.display = 'block';

                    document.getElementById("table-title").innerText = "Loading Calendar...";
                    try {
                        const res = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'get_all', statusFilter: "Awaiting Techpack" }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        });
                        const result = await res.json();
                        let techpackData = [];
                        if (result.status === 'success') {
                            techpackData = result.data.reverse();
                        }
                        renderCalendar(techpackData);
                        document.getElementById("table-title").innerText = "Calendar View";
                    } catch (err) {
                        console.error(err);
                        document.getElementById("table-title").innerText = "Calendar Load Error";
                    }
                });
            }
        });

        async function fetchData(statusFilter = 'Awaiting Meeting', targetElement = null) {
            // Update UI State
            activeViewMode = statusFilter;
            const target = targetElement || document.getElementById("nav-awaiting-meeting");
            document.querySelectorAll(".nav-links a").forEach(a => a.classList.remove("active-nav"));
            if (target) target.classList.add("active-nav");
            document.getElementById("table-title").innerText = statusFilter;

            document.getElementById("table-body").innerHTML = '<tr><td colspan="8" style="text-align:center;">Loading data from database...</td></tr>';

            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_all', statusFilter: statusFilter }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await res.json();
                if (result.status === 'success') {
                    globalData = result.data.reverse(); // Newest first

                    applyFilters(); // Apply Initial View Modes
                    populateFilterOptions();
                }
            } catch (err) {
                console.error("Failed to fetch", err);
                // show error
                document.getElementById("table-body").innerHTML = '<tr><td colspan="8">Failed to fetch data... Verify APPS_SCRIPT_URL.</td></tr>';
            }
        }
        function initIcons() { feather.replace(); }

        function toggleDropdown(fieldId) {
            const dropdown = document.getElementById(`dropdown-${fieldId.replace(' ', '_')}`);
            // Fermer les autres dropdowns
            document.querySelectorAll('.options-dropdown').forEach(d => {
                if (d !== dropdown) d.classList.remove('show');
            });
            dropdown.classList.toggle('show');
        }

        function populateFilterOptions() {
            const fields = ["Title", "Customer", "PL_Name", "Meeting Date"];

            fields.forEach(field => {
                // On cible le container (en remplaçant l'espace par _ pour l'ID HTML)
                const containerId = `container-${field.replace(' ', '_')}`;
                const container = document.getElementById(containerId);
                if (!container) return;

                // Extraire les valeurs uniques
                const uniqueValues = [...new Set(globalData.map(item => item[field]))]
                    .filter(val => val && val !== "")
                    .sort();

                container.innerHTML = ""; // Vider le container

                uniqueValues.forEach(val => {
                    const label = document.createElement('label');
                    label.className = "filter-option";

                    // Création de la checkbox
                    const checkbox = document.createElement('input');
                    checkbox.type = "checkbox";
                    checkbox.value = val;
                    checkbox.dataset.field = field;

                    // Listener pour mettre à jour les filtres actifs
                    checkbox.addEventListener('change', (e) => {
                        const f = e.target.dataset.field;
                        const v = e.target.value;
                        if (e.target.checked) {
                            activeFilters[f].push(v);
                        } else {
                            activeFilters[f] = activeFilters[f].filter(item => item !== v);
                        }
                        // Optionnel: filtrer en temps réel au clic
                        // applyFilters(); 
                    });

                    label.appendChild(checkbox);
                    label.append(val);
                    container.appendChild(label);
                });
            });
        }
        function populateFilterOptions() {
            const fields = ["Title", "Customer", "PL_Name", "Meeting Date"];
            fields.forEach(field => {
                const containerId = `dropdown-${field.replace(' ', '_')}`;
                const container = document.getElementById(containerId);
                const uniqueValues = [...new Set(globalData.map(item => item[field]))]
                    .filter(val => val)
                    .sort();

                container.innerHTML = "";
                uniqueValues.forEach(val => {
                    const label = document.createElement('label');
                    label.className = "filter-option";
                    label.innerHTML = `
                <input type="checkbox" value="${val}" data-field="${field}" 
                ${activeFilters[field].includes(val) ? 'checked' : ''} 
                onchange="handleCheck(this)">
                <span>${val}</span>
            `;
                    container.appendChild(label);
                });
            });
            initIcons();
        }

        function handleCheck(checkbox) {
            const field = checkbox.dataset.field;
            const val = checkbox.value;
            if (checkbox.checked) {
                if (!activeFilters[field].includes(val)) activeFilters[field].push(val);
            } else {
                activeFilters[field] = activeFilters[field].filter(v => v !== val);
            }
        }

        function filterOptions(field, text) {
            const containerId = `dropdown-${field.replace(' ', '_')}`;
            const container = document.getElementById(containerId);
            const options = container.querySelectorAll('.filter-option');
            const dropdown = document.getElementById(containerId);

            // Ouvrir le dropdown si on commence à écrire
            if (text.length > 0) dropdown.classList.add('show');

            options.forEach(opt => {
                const val = opt.querySelector('span').innerText.toLowerCase();
                if (val.includes(text.toLowerCase())) {
                    opt.style.display = "flex";
                } else {
                    opt.style.display = "none";
                }
            });
        }

        // Fermer les dropdowns si on clique ailleurs
        window.onclick = function (event) {
            if (!event.target.closest('.custom-select')) {
                document.querySelectorAll('.options-dropdown').forEach(d => d.classList.remove('show'));
            }
        }

        function applyFilters() {
            filteredData = globalData.filter(row => {
                const matchSearch = globalSearchText === "" ||
                    String(row["C_Number"] || "").toLowerCase().includes(globalSearchText) ||
                    String(row["Title"] || "").toLowerCase().includes(globalSearchText) ||
                    String(row["Customer"] || "").toLowerCase().includes(globalSearchText);

                return matchSearch &&
                    (activeFilters["Title"].length === 0 || activeFilters["Title"].includes(row["Title"])) &&
                    (activeFilters["Customer"].length === 0 || activeFilters["Customer"].includes(row["Customer"])) &&
                    (activeFilters["PL_Name"].length === 0 || activeFilters["PL_Name"].includes(row["PL_Name"])) &&
                    (activeFilters["Meeting Date"].length === 0 || activeFilters["Meeting Date"].includes(row["Meeting Date"]));
            });

            renderTable();
        }

        function resetFilters() {
            // Décocher toutes les cases
            document.querySelectorAll('.multi-select-container input').forEach(cb => cb.checked = false);

            // Réinitialiser l'objet des filtres
            activeFilters = {
                "Title": [],
                "Customer": [],
                "PL_Name": [],
                "Meeting Date": []
            };

            filteredData = [...globalData];
            renderTable();
        }



        function renderTable() {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            // document.getElementById("total-requests").innerText = `Total Requests: ${globalData.length}`;
            document.getElementById("total-requests").innerText = `Total Requests: ${filteredData.length}`;

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No matching records found.</td></tr>';
                return;
            }
            // globalData.forEach(row => {
            const formatDate = (dateStr) => {
                if (!dateStr || String(dateStr).trim() === '-' || String(dateStr).trim() === '') return '';
                const d = new Date(dateStr);
                return isNaN(d) ? dateStr : d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
            };

            filteredData.forEach(row => {
                const tr = document.createElement("tr");

                let assigneesHtml = '';
                const assigneeList = (row["PL_Name"] || 'Unassigned').split(',').map(s => s.trim()).filter(s => s);
                if (assigneeList.length === 0) assigneeList.push('Unassigned');

                let limit = 3;
                let fullNames = assigneeList.join(', ');
                assigneesHtml += `<div style="display:flex; flex-direction:column; gap:4px;" title="All Assigned PLs:\n${fullNames.replace(/, /g, '\n')}">`;
                for (let i = 0; i < assigneeList.length; i++) {
                    if (i < limit) {
                        let name = assigneeList[i];
                        const avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name === 'Unassigned' ? 'U' : name) + '&background=random&color=fff';
                        assigneesHtml += `
                        <div style="display: flex; align-items: center; gap: 8px;">
                          <img src="${avatarUrl}" alt="${name}" style="width: 24px; height: 24px; border-radius: 50%;" />
                          <span>${name}</span>
                        </div>`;
                    }
                }
                if (assigneeList.length > limit) {
                    let diff = assigneeList.length - limit;
                    assigneesHtml += `
                        <div style="display: flex; align-items: center; gap: 8px; color: var(--primary); font-weight: 600; font-size: 0.85rem; padding-left: 2px;">
                          <div style="width: 20px; height: 20px; border-radius: 50%; background-color: #e2e8f0; display:flex; align-items:center; justify-content:center; font-size: 10px; font-weight: bold; color: #475569;">+${diff}</div>
                          <span>more...</span>
                        </div>`;
                }
                assigneesHtml += `</div>`;

                // Columns: Request ID, Title(Style), Customer, Assigned PL, Costing_RD, Status, Meeting Date, Action
                tr.innerHTML = `
            <td><a class="req-id-link" onclick='openModalById("${row["C_Number"]}")'>${row["C_Number"] || ''}</a></td>
            <td>${row["Title"] || ''}</td>
            <td>${row["Customer"] || ''}</td>
            <td>${assigneesHtml}</td>
            <td>${formatDate(row["Costing Ready Date"])}</td>
            <td><span class="status-pill">${row["Status"] || ''}</span></td>
            <td>${formatDate(row["Meeting Date"])}</td>
            <td><button class="btn-outline-blue btn-sm" onclick='openModalById("${row["C_Number"]}")' style="padding:4px 8px;font-size:0.8rem;">Details</button></td>
        `;
                tbody.appendChild(tr);
            });
        }

        function openModalById(c_num) {
            const row = globalData.find(r => r["C_Number"] === c_num);
            if (row) openModal(row);
        }

        function openModal(row) {
            currentModalRow = row;
            document.getElementById("edit-row-index").value = row._rowIndex;

            const list = document.getElementById("modal-details-list");
            list.innerHTML = "";

            DETAIL_FIELDS.forEach(field => {
                const div = document.createElement('div');
                div.className = "detail-row";

                let labelName = field === "C_Number" ? "Request ID" : field;
                if (field === "PL_Name") labelName = "PL Name";
                if (field === "Customer Department") labelName = "Cus Dept";
                if (field === "Requested_Date") labelName = "Created";

                let val = row[field];
                if (val === undefined || val === "") val = "N/A";

                let displayVal = val;
                // Format Created date exactly to DD/MM/YYYY
                if (field === "Requested_Date" && val !== "N/A") {
                    let d = null;
                    if (val instanceof Date) {
                        d = val;
                    } else {
                        d = new Date(val);
                    }

                    if (d && !isNaN(d)) {
                        const day = String(d.getDate()).padStart(2, '0');
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const year = d.getFullYear();
                        displayVal = `${day}/${month}/${year}`;
                    }
                }

                if (field === "Folder Path" && val !== "N/A") {
                    displayVal = `<a href="${val}" target="_blank" style="color:#3b82f6;">Open Folder</a>`;
                }

                div.innerHTML = `
            <span class="detail-label">${labelName}</span>
            <span class="detail-value" id="val-${field}">${displayVal}</span>
        `;
                list.appendChild(div);
            });

            cancelEditMode(true); // reset state without triggering re-render
            document.getElementById("request-modal").style.display = "flex";
            if (typeof resetProcessMenu === 'function') resetProcessMenu();

            // Hide action buttons for Cancel and Awaiting Techpack views
            if (activeViewMode !== "Awaiting Meeting") {
                document.getElementById("btn-edit").style.display = "none";
                document.getElementById("main-actions").style.display = "none";
            } else {
                document.getElementById("btn-edit").style.display = "block";
                document.getElementById("main-actions").style.display = "flex";
            }
        }

        function closeModal() {
            document.getElementById("request-modal").style.display = "none";
        }

        let isEditing = false;
        function enableEditMode() {
            isEditing = true;
            document.getElementById("main-actions").style.display = "none";
            document.getElementById("btn-edit").style.display = "none";
            document.getElementById("edit-actions").style.display = "flex";

            // Transform values into inputs
            DETAIL_FIELDS.forEach(field => {
                if (field === "Folder Path" || field === "Created By" || field === "Requested_Date" || field === "C_Number" || field === "Remarks") return; // Keep non-editable

                const valSpan = document.getElementById(`val-${field}`);
                if (valSpan) {
                    const currentVal = currentModalRow[field] || "";
                    valSpan.innerHTML = `<input type="text" class="detail-input" id="input-${field}" value="${currentVal}">`;
                }
            });
        }

        function cancelEditMode(preventRender = false) {
            isEditing = false;
            document.getElementById("main-actions").style.display = "flex";
            document.getElementById("btn-edit").style.display = "block";
            document.getElementById("edit-actions").style.display = "none";
            if (!preventRender && currentModalRow && document.getElementById("request-modal").style.display !== "none") {
                openModal(currentModalRow); // Re-render text mode
            }
        }

        async function saveEdit() {
            const updates = {};
            let hasChanges = false;
            DETAIL_FIELDS.forEach(field => {
                const input = document.getElementById(`input-${field}`);
                if (input) {
                    if (input.value !== currentModalRow[field]) {
                        updates[field] = input.value;
                        hasChanges = true;
                    }
                }
            });

            if (!hasChanges) {
                cancelEditMode();
                return;
            }

            await performUpdate(updates);
        }

        async function updateStatus(newStatus) {
            if (currentModalRow.Status === newStatus) return; // No change
            const updates = { Status: newStatus };
            if (newStatus === "Awaiting Techpack") {
                const d = new Date();
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                updates["Tehpack_uplaodDate"] = `${year}-${month}-${day}`;
            }
            await performUpdate(updates);
        }

        async function performUpdate(updates) {
            const btnCancel = document.getElementById("btn-cancel");
            const btnProcess = document.getElementById("btn-process");
            const btnSave = document.getElementById("btn-save");

            const spinnerHtml = '<div class="spinner"></div>';

            if (updates.Status === "Cancel" && btnCancel) {
                btnCancel.innerHTML = spinnerHtml + 'Canceling...';
            } else if (updates.Status === "Awaiting Techpack" && btnProcess) {
                btnProcess.innerHTML = spinnerHtml + 'Processing...';
            } else if (btnSave) {
                btnSave.innerHTML = spinnerHtml + 'Saving...';
            }

            if (btnSave) btnSave.disabled = true;
            if (btnCancel) btnCancel.disabled = true;
            if (btnProcess) btnProcess.disabled = true;

            const payload = {
                action: 'update',
                rowIndex: currentModalRow._rowIndex,
                updates: updates
            };

            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await res.json();

                if (result.status === 'success') {
                    // update local data
                    Object.assign(currentModalRow, updates);
                    renderTable();
                    closeModal();
                } else {
                    alert("Update failed: " + result.message);
                }
            } catch (err) {
                console.error(err);
                alert("Action failed. See console.");
            } finally {
                if (btnSave) { btnSave.innerHTML = "Save Changes"; btnSave.disabled = false; }
                if (btnCancel) { btnCancel.innerHTML = "Not Proceed"; btnCancel.disabled = false; }
                if (btnProcess) { btnProcess.innerHTML = "Submit"; btnProcess.disabled = false; }
            }
        }

        let calCurrentDate = new Date();
        let currentCalendarData = [];

        function renderCalendar(data) {
            if (data) {
                currentCalendarData = data;
            } else {
                data = currentCalendarData;
            }

            const grid = document.getElementById('calendar-grid');
            if (!grid) return;
            grid.innerHTML = '';

            const year = calCurrentDate.getFullYear();
            const month = calCurrentDate.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('cal-month-title').textContent = `${monthNames[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let dayCounts = {};
            const parseDate = (dStr) => {
                if (!dStr) return null;
                if (typeof dStr === 'string' && dStr.includes('/')) {
                    const parts = dStr.split(/[ /:]/);
                    if (parts.length >= 3) {
                        return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
                    }
                }
                const d = new Date(dStr);
                return isNaN(d) ? null : d;
            };

            data.forEach(row => {
                const d = parseDate(row.Tehpack_uplaodDate);
                if (d) {
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        let day = d.getDate();
                        dayCounts[day] = (dayCounts[day] || 0) + 1;
                    }
                }
            });

            for (let x = 0; x < firstDayIndex; x++) {
                let emptyCell = document.createElement('div');
                emptyCell.style.background = '#f9fafb';
                emptyCell.style.borderRadius = '6px';
                grid.appendChild(emptyCell);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                let dayCell = document.createElement('div');
                dayCell.style.border = '1px solid #e5e7eb';
                dayCell.style.borderRadius = '6px';
                dayCell.style.padding = '8px';
                dayCell.style.display = 'flex';
                dayCell.style.flexDirection = 'column';
                dayCell.style.backgroundColor = '#ffffff';

                let dateNumber = document.createElement('strong');
                dateNumber.style.color = '#374151';
                dateNumber.textContent = i;
                dayCell.appendChild(dateNumber);

                if (dayCounts[i]) {
                    let countBadge = document.createElement('div');
                    countBadge.style.marginTop = 'auto';
                    countBadge.style.backgroundColor = 'var(--primary-color)';
                    countBadge.style.color = '#fff';
                    countBadge.style.padding = '4px 8px';
                    countBadge.style.borderRadius = '4px';
                    countBadge.style.fontSize = '12px';
                    countBadge.style.fontWeight = 'bold';
                    countBadge.style.textAlign = 'center';
                    countBadge.style.cursor = 'pointer';
                    countBadge.textContent = `${dayCounts[i]} Request${dayCounts[i] > 1 ? 's' : ''}`;

                    countBadge.addEventListener('mouseenter', () => countBadge.style.opacity = '0.8');
                    countBadge.addEventListener('mouseleave', () => countBadge.style.opacity = '1');

                    countBadge.addEventListener('click', () => {
                        const dailyReqs = data.filter(r => {
                            const rd = parseDate(r.Tehpack_uplaodDate);
                            return rd && rd.getFullYear() === year && rd.getMonth() === month && rd.getDate() === i;
                        });
                        const modal = document.getElementById('calendar-day-modal');
                        const title = document.getElementById('calendar-day-title');
                        const content = document.getElementById('calendar-day-content');

                        if (modal && title && content) {
                            title.textContent = `Requests on ${monthNames[month]} ${i}, ${year}`;
                            content.innerHTML = dailyReqs.map(r => `
                                <div style="padding: 10px 8px; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; gap: 8px;">
                                   <div style="display:flex; flex-direction: column;">
                                       <span style="font-weight: 500; color: #1e293b;">${r.C_Number || 'Unknown ID'}</span>
                                       <span style="font-size: 12px; color: #64748b;">${r.Customer || 'No Customer'}</span>
                                   </div>
                                   <button class="btn-outline-blue calendar-details-btn" data-id="${r.C_Number}" style="padding: 6px 10px; font-size: 12px;">View Details</button>
                                </div>
                             `).join('');

                            const calDetailsBtns = content.querySelectorAll('.calendar-details-btn');
                            calDetailsBtns.forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    const cnum = e.currentTarget.getAttribute('data-id');
                                    let gRow = globalData.find(gr => gr.C_Number === cnum);
                                    if (!gRow) {
                                        let techRow = data.find(tr => tr.C_Number === cnum);
                                        if (techRow) globalData.push(techRow);
                                    }
                                    openModalById(cnum);
                                });
                            });
                            modal.style.display = 'flex';
                        }
                    });
                    dayCell.appendChild(countBadge);
                }
                grid.appendChild(dayCell);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const prevBtn = document.getElementById('cal-prev-btn');
            if (prevBtn) prevBtn.addEventListener('click', () => { calCurrentDate.setMonth(calCurrentDate.getMonth() - 1); renderCalendar(); });
            const nextBtn = document.getElementById('cal-next-btn');
            if (nextBtn) nextBtn.addEventListener('click', () => { calCurrentDate.setMonth(calCurrentDate.getMonth() + 1); renderCalendar(); });
            const closeCalDayBtn = document.getElementById('close-calendar-day-btn');
            if (closeCalDayBtn) closeCalDayBtn.addEventListener('click', () => { document.getElementById('calendar-day-modal').style.display = 'none'; });
        });
    </script>
</body>

</html>
